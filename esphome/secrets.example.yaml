# Copy to secrets.yaml (gitignored) and fill in your values.
#
# Generate api_key + ota_password once:
#   python -c "import secrets,base64; print('api_key:', base64.b64encode(secrets.token_bytes(32)).decode()); print('ota_password:', secrets.token_hex(16))"
#
# Get bulb_initial_seq:
#   python tools/status_seed.py 15 DC:23:4E:xx:xx:xx
#   (set TUYA_LOCALKEY first)

wifi_ssid: "YourWiFiNetwork"
wifi_password: "yourwifipassword"
api_key: "base64-32-byte-key-here=="
ota_password: "hex-ota-password-here"

# Per-bulb credentials (duplicate this block for each bulb, with unique names)
bulb_local_key: "YOURLOCALKEY1234"     # exactly 16 ASCII chars — see README for extraction methods
bulb_controller_name: "YourBTName"    # BT name of the phone that paired the bulb (≤8 chars)
bulb_mac_address: "DC:23:4E:xx:xx:xx"
bulb_initial_seq: "0x001000"           # run status_seed.py to get the real value
